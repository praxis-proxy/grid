[advisories]
unmaintained = "all"
maximum-db-staleness = "P30D"
ignore = [
    # bincode 2.x is unmaintained (RUSTSEC-2025-0141); it is a transitive
    # dependency via foca → swim and has no safe upstream upgrade path.
    { id = "RUSTSEC-2025-0141", reason = "transitive via foca→swim; no upstream fix available" },
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]

# foca uses MPL-2.0; allowed as a scoped exception rather than globally
# permitting copyleft licenses.
[[licenses.exceptions]]
allow = ["MPL-2.0"]
name = "foca"
version = "*"

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
