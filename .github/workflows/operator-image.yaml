name: Operator Image

# ------------------------------------------------------------------------------
# Workflow Settings
# ------------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions: {}

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/praxis-proxy/grid-operator

jobs:
  # ----------------------------------------------------------------------------
  # Build the operator container image
  # ----------------------------------------------------------------------------

  operator-image:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-rust-1.96.0-operator-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-1.96.0-operator-
          save-always: true

      - name: Build operator binary
        run: cargo build -p operator --bin operator --release

      - name: Prepare build context
        run: cp target/release/operator deploy/operator/operator

      - name: Build container image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build -f deploy/operator/Containerfile \
            -t "${IMAGE_NAME}:sha-${SHORT_SHA}" \
            deploy/operator/

      - name: Tag latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker tag "${IMAGE_NAME}:sha-${SHORT_SHA}" "${IMAGE_NAME}:latest"

      # Publishing is intentionally disabled until GHCR package ownership and
      # repository permissions are configured for ghcr.io/praxis-proxy.
      #
      # - name: Log in to GHCR
      #   if: github.event_name != 'pull_request'
      #   run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      #
      # - name: Push SHA image
      #   if: github.event_name != 'pull_request'
      #   run: |
      #     SHORT_SHA="${GITHUB_SHA::7}"
      #     docker push "${IMAGE_NAME}:sha-${SHORT_SHA}"
      #
      # - name: Push latest
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      #   run: docker push "${IMAGE_NAME}:latest"

      - name: Clean up build context
        if: always()
        run: rm -f deploy/operator/operator
