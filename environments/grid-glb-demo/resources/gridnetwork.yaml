apiVersion: grid.praxis-proxy.io/v1alpha1
kind: GridNetwork
metadata:
  name: glb-demo
spec:
  gridId: ""
  region: us-east
  zone: us-east-1a

  swim:
    probeInterval: "5s"
    suspicionTimeout: "10s"
    gossipNodes: 3

  gatewayRefs:
    - name: consumer-gateway
      namespace: grid-system
      localSiteName: edge-control-site
      consumerConfig:
        enabled: true
        configMapName: praxis-consumer-config
        listenerPort: 8080
        credentialMountBase: /run/secrets/grid-credentials
        tlsCertMountPath: /etc/praxis/tls
        # After applying inference-sim stacks on provider clusters,
        # replace these addresses with the MetalLB-assigned IPs:
        #   kubectl --context kind-grid-glb-provider-east get svc -n grid-system provider-gateway \
        #     -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
        #   kubectl --context kind-grid-glb-provider-west get svc -n grid-system provider-gateway \
        #     -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
        clusterEndpoints:
          - cluster: provider-east
            address: "PROVIDER_EAST_GATEWAY_IP:8080"
            transport:
              mode: plaintext
          - cluster: provider-west
            address: "PROVIDER_WEST_GATEWAY_IP:8080"
            transport:
              mode: plaintext

  tls:
    caSecretRef: null
    siteSecretRef: null
    swimKeyRef: null
