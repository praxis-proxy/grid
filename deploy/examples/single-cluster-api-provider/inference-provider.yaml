apiVersion: grid.praxis-proxy.io/v1alpha1
kind: InferenceProvider
metadata:
  name: anthropic-production
spec:
  # Link to the GridNetwork
  gridNetworkRef: example

  # Provider configuration
  providerKind: anthropic
  backendKind: api_provider
  endpoint: https://api.anthropic.com

  # Models served
  models:
    - name: claude-3-5-sonnet-20241022
      capabilities: ["text_generation", "tool_use"]
      contextWindow: 200000
    - name: claude-3-5-haiku-20241022
      capabilities: ["text_generation", "tool_use"]
      contextWindow: 200000

  # Authentication (requires Secret)
  auth:
    strategy: api_key
    manual: false
    secretRef:
      name: anthropic-api-key
      namespace: default
      key: api-key

  # Cost information (approximate)
  cost:
    perMillionInputTokens: 3.00
    perMillionOutputTokens: 15.00

  # Site selector (matches all sites)
  siteSelector:
    matchLabels: {}

  # Access policy (allow all sites)
  accessPolicy:
    siteSelector:
      matchLabels: {}

  # Health check
  healthCheck:
    path: /v1/complete
    interval: "60s"
    timeout: "10s"

  # No metrics scraping for external API
  metricsConfig: null

  # Use provider name as routing cluster
  routingClusterRef: null
