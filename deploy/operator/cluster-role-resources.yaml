apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: grid-operator-resources
  labels:
    app.kubernetes.io/managed-by: grid-operator
rules:
  # ── Secrets (namespaced) ────────────────────────────────────────────
  #
  # Read paths:
  #   - TLS site certificate (tls.crt only; tls.key is never read)
  #   - SWIM encryption key (swimKeyRef)
  #   - Credential Secrets (existence + key validation only)
  #
  # Write paths:
  #   - Grid CA certificate Secret (ca.crt, ca.key)
  #   - Grid site certificate Secret (tls.crt, tls.key)
  #
  # All writes use server-side apply (patch).  SSA on a non-existent
  # resource requires create permission, so both create and patch are
  # granted.  delete, list, and watch are not granted.  The namespace
  # for each Secret is declared in the CRD spec (SecretRef.namespace).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]

  # ── ConfigMaps (namespaced) ─────────────────────────────────────────
  #
  # Write paths:
  #   - Routing overlay ConfigMap (grid-overlay-{network}-{gateway})
  #   - Consumer Praxis config ConfigMap (consumerConfig.configMapName)
  #
  # All writes use server-side apply (patch).  SSA on a non-existent
  # resource requires create, so both create and patch are granted.
  # The namespace is the GatewayRef namespace declared in the
  # GridNetwork spec.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "patch"]
