apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Complete Grid deployment: CRDs + operator
# Apply CRDs first, then operator resources

resources:
  # CRDs must be applied first
  - crds/gridnetwork.yaml
  - crds/gridsite.yaml
  - crds/inferenceprovider.yaml
  # Operator resources
  - operator/

labels:
  - pairs:
      app.kubernetes.io/part-of: grid
